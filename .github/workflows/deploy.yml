name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Deploy
        run: |
          cd /opt/garuda-astra

          git fetch origin

          CHANGED=$(git diff --name-only HEAD origin/main)

          echo "Changed files:"
          echo "$CHANGED"

          git pull origin main

          # Frontend dependencies
          if echo "$CHANGED" | grep -E "apps/web-dashboard/package.json|apps/web-dashboard/package-lock.json"; then
            cd apps/web-dashboard
            npm install
            cd ../..
          fi

          # Frontend
          if echo "$CHANGED" | grep "^apps/web-dashboard/"; then
            cd apps/web-dashboard
            npm run build
            cd ../..
            sudo systemctl restart garuda-frontend
          fi

          # Backend dependencies
          if echo "$CHANGED" | grep "services/requirements.txt"; then
            source services/venv/bin/activate
            pip install -r services/requirements.txt
          fi

          # Backend
          if echo "$CHANGED" | grep "^services/backend/"; then
            sudo systemctl restart garuda-backend
          fi

          # AI Services
          if echo "$CHANGED" | grep "^services/ai/"; then
            echo "AI service changed"
          fi